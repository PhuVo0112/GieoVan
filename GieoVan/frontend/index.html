<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gieo Vần - Thơ Ca</title>
  <link rel="icon" type="image/png" href="/assets/images/logo.png?v=3" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <div class="container">
    <div class="auth-status-container" id="authStatusArea"
      style="position: absolute; top: 20px; left: 20px; font-size: 13.5px; font-family: 'Lora', 'Inter', sans-serif; color: var(--text-muted);">
    </div>
    <button class="lang-toggle" id="langBtn" onclick="toggleLanguage()">
      EN
    </button>

    <header class="hero-banner">
      <div class="banner-overlay"></div>
      <div class="banner-content">
        <h1 id="ui-title" class="banner-title">Gieo Vần Thơ Ca</h1>
        <p id="ui-subtitle" class="banner-tagline">
          "Nơi những vần điệu tìm thấy sự đồng điệu của tâm hồn"
        </p>
        <nav class="nav-tabs"
          style="display: flex; gap: 20px; justify-content: center; margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; font-family: 'Lora', 'Inter', sans-serif; font-size: 15px;">
          <a href="/" id="navTabWrite"
            style="color: var(--text-main); font-weight: 600; text-decoration: none; border-bottom: 2px solid var(--text-main); padding-bottom: 5px;">Chắp
            Bút Làm Thơ</a>
          <a href="/feed" id="navTabFeed"
            style="color: var(--text-muted); font-weight: 500; text-decoration: none; padding-bottom: 5px; transition: color 0.3s ease;">Bảng
            Tin Thơ Ca</a>
          <a href="/archive" id="navTabArchive"
            style="display: none; color: var(--text-muted); font-weight: 500; text-decoration: none; padding-bottom: 5px; transition: color 0.3s ease;">Góc
            của tôi</a>
        </nav>

        <div class="input-group">
          <textarea id="lyricInput"
            placeholder="Chắp bút viết một câu thơ...&#10;Ví dụ: Anh bước đi trong bóng tối cuộc đời"
            oninput="updateArchiveButtonVisibility()"></textarea>
        </div>

        <div class="control-group" style="margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 12px; font-family: 'Lora', 'Inter', sans-serif;">
          <label for="rhymeModeSelect" id="ui-label-rhyme-mode" style="color: var(--text-main); font-weight: 600; font-size: 14.5px;">Chế độ gieo vần:</label>
          <select id="rhymeModeSelect" style="background: #faf8f5; border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 12px; border-radius: 4px; font-size: 14.5px; font-family: 'Lora', 'Inter', sans-serif; cursor: pointer; outline: none; transition: all 0.3s ease;">
            <option value="one_word" id="opt-one-word" style="background: #faf8f5; color: var(--text-main);">Một từ cuối (Mặc định)</option>
            <option value="two_words" id="opt-two-words" style="background: #faf8f5; color: var(--text-main);">Hai từ cuối (Vần kép)</option>
            <option value="semantic_only" id="opt-semantic-only" style="background: #faf8f5; color: var(--text-main);">Không vần (Chỉ ngữ nghĩa)</option>
          </select>
        </div>

        <div class="btn-group">
          <button class="action-btn" id="ui-btn-analyze" onclick="analyzeLyrics(event)">
            Phân Tích Ngữ Âm
          </button>
          <button class="action-btn btn-primary" id="ui-btn-generate" onclick="generateLyrics(event)">
            Chắp Bút Sinh Câu
          </button>
        </div>

        <div id="loadingIndicator" class="loading">
          Đang lắng nghe tiếng vọng từ hệ thống...
        </div>

        <div class="output-box" id="outputArea">
          <p id="ui-empty-out" style="
            color: #a1887f;
            font-style: italic;
            text-align: center;
            margin: 0;
          ">
            Trang giấy trắng đang chờ nét mực của bạn.
          </p>
        </div>

        <div id="archiveBtnContainer" style="text-align: right; margin-top: 15px;">
          <button id="archivePoemBtn" disabled onclick="saveArchive(this)"
            onmouseover="if(!this.disabled){this.style.background='var(--text-main)'; this.style.color='#ffffff';}"
            onmouseout="if(!this.disabled){this.style.background='transparent'; this.style.color='var(--text-main)';}"
            style="background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); padding: 8px 20px; border-radius: 4px; cursor: not-allowed; font-size: 14.5px; font-family: 'Lora', 'Inter', sans-serif; font-weight: 600; opacity: 0.4; transition: all 0.3s ease; pointer-events: none;">
            Cất Vào Kho
          </button>
        </div>
      </div>

      <script>
        const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.hostname === "";
        const API_BASE_URL = isLocal ? "http://127.0.0.1:8000" : "https://gieovan.onrender.com";
        console.log("==> [SYSTEM CONFIG] Current API Endpoint:", `${API_BASE_URL}/api`);
        let currentLang = localStorage.getItem("preferred_lang") || "vi";

        // Từ điển Đa ngôn ngữ
        const i18n = {
          vi: {
            title: "Gieo Vần Thơ Ca",
            subtitle: '"Nơi những vần điệu tìm thấy sự đồng điệu của tâm hồn"',
            placeholder:
              "Chắp bút viết một câu thơ...\nVí dụ: Anh bước đi trong bóng tối cuộc đời",
            btnAnalyze: "Phân Tích Ngữ Âm",
            btnGenerate: "Chắp Bút Sinh Câu",
            loading: "Đang lắng nghe tiếng vọng từ hệ thống...",
            emptyOut: "Trang giấy trắng đang chờ nét mực của bạn.",
            alertEmpty: "Xin hãy để lại đôi dòng trước khi thực hiện!",
            lastWord: "Từ hạ bút",
            rhymeDet: "Vần bắt được",
            suggestVibe: "Gợi ý từ văn phong:",
            museReply: "Nhà thơ đáp lại:",
            errConn: "Lỗi kết nối đứt đoạn. Xin kiểm tra lại Backend.",
            toggleText: "EN",
            tabWrite: "Chắp Bút Làm Thơ",
            tabFeed: "Bảng Tin Thơ Ca",
            tabArchive: "Góc của tôi",
            login: "Đăng nhập",
            register: "Đăng ký",
            logout: "Đăng xuất",
            welcome: "Chào",
            btnSave: "Lưu lại",
            btnSaved: "✓ Đã lưu",
            errSaveFail: "Lưu thất bại: ",
            errServerConn: "Lỗi kết nối server. Vui lòng kiểm tra backend đang chạy.",
            btnArchive: "Cất Vào Kho",
            toastSaved: "Đã cất bài thơ vào Góc của tôi ở chế độ riêng tư",
            errNeedLogin: "Vui lòng đăng nhập để cất bài thơ vào kho lưu trữ.",
            labelRhymeMode: "Chế độ gieo vần:",
            optOneWord: "Một từ cuối (Mặc định)",
            optTwoWords: "Hai từ cuối (Vần kép)",
            optSemanticOnly: "Không vần (Chỉ ngữ nghĩa)"
          },
          en: {
            title: "Poetry & Rhymes",
            subtitle: '"Where rhymes find the harmony of the soul"',
            placeholder:
              "Pen down a line of poetry...\nExample: Walking alone in the dark of night",
            btnAnalyze: "Analyze Phonetics",
            btnGenerate: "Generate Lines",
            loading: "Listening to the echoes of the system...",
            emptyOut: "A blank page awaits your ink.",
            alertEmpty: "Please leave a few lines before proceeding!",
            lastWord: "Last word",
            rhymeDet: "Detected rhyme",
            suggestVibe: "Stylistic suggestions:",
            museReply: "The muse replies:",
            errConn: "Connection lost. Please check the Backend.",
            toggleText: "VI",
            tabWrite: "Compose Poetry",
            tabFeed: "Poetry Feed",
            tabArchive: "My Archive",
            login: "Log In",
            register: "Sign Up",
            logout: "Log Out",
            welcome: "Welcome",
            btnSave: "Save",
            btnSaved: "✓ Saved",
            errSaveFail: "Save failed: ",
            errServerConn: "Server connection error. Please verify backend is running.",
            btnArchive: "Store in Archive",
            toastSaved: "Stored the poem in My Archive in private mode",
            errNeedLogin: "Please log in to store the poem in your archive.",
            labelRhymeMode: "Rhyme Mode:",
            optOneWord: "Single end word (Default)",
            optTwoWords: "Double end words (Couplet)",
            optSemanticOnly: "No rhyme (Semantics only)"
          },
        };

        function toggleLanguage() {
          currentLang = currentLang === "vi" ? "en" : "vi";
          localStorage.setItem("preferred_lang", currentLang);
          updateUI();
        }

        function updateUI() {
          const t = i18n[currentLang];

          document.getElementById("ui-title").innerText = t.title;
          document.getElementById("ui-subtitle").innerText = t.subtitle;
          document.getElementById("lyricInput").placeholder = t.placeholder;
          document.getElementById("ui-btn-analyze").innerText = t.btnAnalyze;
          document.getElementById("ui-btn-generate").innerText = t.btnGenerate;
          document.getElementById("loadingIndicator").innerText = t.loading;
          document.getElementById("langBtn").innerText = t.toggleText;
          document.getElementById("navTabWrite").innerText = t.tabWrite;
          document.getElementById("navTabFeed").innerText = t.tabFeed;
          document.getElementById("navTabArchive").innerText = t.tabArchive;

          const archivePoemBtn = document.getElementById("archivePoemBtn");
          if (archivePoemBtn) {
            archivePoemBtn.innerText = t.btnArchive;
          }

          const uiLabelRhymeMode = document.getElementById("ui-label-rhyme-mode");
          if (uiLabelRhymeMode) uiLabelRhymeMode.innerText = t.labelRhymeMode;
          const optOneWord = document.getElementById("opt-one-word");
          if (optOneWord) optOneWord.innerText = t.optOneWord;
          const optTwoWords = document.getElementById("opt-two-words");
          if (optTwoWords) optTwoWords.innerText = t.optTwoWords;
          const optSemanticOnly = document.getElementById("opt-semantic-only");
          if (optSemanticOnly) optSemanticOnly.innerText = t.optSemanticOnly;

          // Cập nhật lại thanh chào người dùng theo ngôn ngữ mới
          checkAuth();

          // Trả lại trạng thái trống nếu đang không có kết quả
          const outputArea = document.getElementById("outputArea");
          if (
            outputArea.innerHTML.includes("ui-empty-out") ||
            outputArea.innerText.trim() === i18n["vi"].emptyOut ||
            outputArea.innerText.trim() === i18n["en"].emptyOut
          ) {
            outputArea.innerHTML = `<p id="ui-empty-out" style="color: #a1887f; font-style: italic; text-align: center; margin: 0;">${t.emptyOut}</p>`;
          } else {
            // Xóa output cũ khi đổi ngôn ngữ để tránh hiển thị song ngữ lộn xộn
            outputArea.innerHTML = `<p id="ui-empty-out" style="color: #a1887f; font-style: italic; text-align: center; margin: 0;">${t.emptyOut}</p>`;
          }

          updateArchiveButtonVisibility();
        }

        async function analyzeLyrics(event) {
          if (event) event.preventDefault();

          const text = document.getElementById("lyricInput").value;
          const t = i18n[currentLang];

          if (!text.trim()) return showToast(t.alertEmpty, "info");

          toggleLoading(true);
          try {
            const res = await fetch(`${API_BASE_URL}/api/analyze-and-suggest`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                text: text,
                mood: "all",
                lang: currentLang,
              }),
            });
            if (!res.ok) {
              const errData = await res.json().catch(() => ({}));
              throw new Error(errData.detail || t.errConn);
            }
            const data = await res.json();

            let html = `<p>${t.lastWord}: <span class="highlight">${data.analysis.last_word}</span> | ${t.rhymeDet}: <span class="highlight">${data.analysis.detected_rhyme}</span></p>`;
            html += `<div class="output-title">${t.suggestVibe}</div>`;
            const suggestions = data.stylistic_suggestions || (data.contextual_suggestions ? data.contextual_suggestions.map(x => x.text) : []);
            suggestions.forEach((textLine) => {
              html += `<div class="result-item"><p style="margin: 0;">${textLine}</p></div>`;
            });

            document.getElementById("outputArea").innerHTML = html;
          } catch (err) {
            showToast(err.message, "error");
          }
          toggleLoading(false);
          updateArchiveButtonVisibility();
        }

        async function generateLyrics(event) {
          if (event) event.preventDefault();

          const text = document.getElementById("lyricInput").value;
          const t = i18n[currentLang];

          if (!text.trim()) return showToast(t.alertEmpty, "info");

          const rhymeModeSelect = document.getElementById("rhymeModeSelect");
          const rhymeMode = rhymeModeSelect ? rhymeModeSelect.value : "one_word";

          toggleLoading(true);
          try {
            const res = await fetch(`${API_BASE_URL}/api/generate-next-lines`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                text: text,
                mood: "melancholic",
                count: 3,
                lang: currentLang,
                rhyme_mode: rhymeMode,
              }),
            });
            if (!res.ok) {
              const errData = await res.json().catch(() => ({}));
              throw new Error(errData.detail || t.errConn);
            }
            const data = await res.json();

            let html = `<div class="output-title">${t.museReply}</div>`;
            data.suggestions.forEach((line, index) => {
              const safeId = `poem-save-btn-${Date.now()}-${index}`;
              const escapedContent = line.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
              html += `
              <div class="result-item" style="display: flex; justify-content: space-between; align-items: center; gap: 12px;">
                <p style="flex: 1; margin: 0;">${line}</p>
                <button
                  id="${safeId}"
                  class="save-poem-btn"
                  onclick="savePoem(this, '${escapedContent}')"
                  style="flex-shrink: 0; background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: 'Lora', 'Inter', sans-serif; transition: all 0.3s ease; white-space: nowrap;"
                >${t.btnSave}</button>
              </div>
            `;
            });

            document.getElementById("outputArea").innerHTML = html;
          } catch (err) {
            showToast(err.message, "error");
          }
          toggleLoading(false);
          updateArchiveButtonVisibility();
        }

        async function savePoem(btn, content) {
          const t = i18n[currentLang];
          const originalText = btn.innerText;
          btn.innerText = "...";
          btn.disabled = true;
          btn.style.opacity = "0.6";
          btn.style.cursor = "not-allowed";

          try {
            const headers = { "Content-Type": "application/json" };
            const token = localStorage.getItem("access_token");
            if (token) {
              headers["Authorization"] = `Bearer ${token}`;
            }

            const res = await fetch(`${API_BASE_URL}/api/poems`, {
              method: "POST",
              headers: headers,
              body: JSON.stringify({ content: content, is_public: false }),
            });

            if (res.ok) {
              btn.innerText = t.btnSaved;
              btn.style.opacity = "1";
              btn.style.backgroundColor = "var(--text-muted)";
              btn.style.color = "#ffffff";
              btn.style.borderColor = "var(--text-muted)";
            } else {
              const errData = await res.json().catch(() => ({}));
              btn.innerText = originalText;
              btn.disabled = false;
              btn.style.opacity = "1";
              btn.style.cursor = "pointer";
              showToast(t.errSaveFail + (errData.detail || "Lỗi hệ thống"), "error");
            }
          } catch (err) {
            btn.innerText = originalText;
            btn.disabled = false;
            btn.style.opacity = "1";
            btn.style.cursor = "pointer";
            showToast(t.errServerConn, "error");
          }
        }

        function getCompletePoemContent() {
          const inputVal = document.getElementById("lyricInput").value.trim();
          const outputArea = document.getElementById("outputArea");
          let hasOutput = false;
          if (outputArea) {
            const emptyPara = document.getElementById("ui-empty-out");
            if (!emptyPara && outputArea.innerText.trim().length > 0) {
              hasOutput = true;
            }
          }
          if (!hasOutput) {
            return inputVal;
          }
          const resultItems = outputArea.querySelectorAll(".result-item");
          const lines = [];
          resultItems.forEach((item) => {
            const span = item.querySelector("span");
            if (span) {
              const text = (span.innerText || span.textContent).trim();
              if (text) {
                lines.push(text);
              }
            } else {
              let text = "";
              item.childNodes.forEach(node => {
                if (node.nodeType === Node.TEXT_NODE) {
                  text += node.textContent;
                } else if (node.nodeType === Node.ELEMENT_NODE && node.tagName !== "BUTTON") {
                  text += node.innerText || node.textContent;
                }
              });
              if (text.trim()) {
                lines.push(text.trim());
              }
            }
          });
          return lines.join("\n");
        }

        function showToast(message, type = "info") {
          const existing = document.querySelector(".custom-toast");
          if (existing) {
            existing.remove();
          }
          let container = document.querySelector(".toast-container");
          if (!container) {
            container = document.createElement("div");
            container.className = "toast-container";
            document.body.appendChild(container);
          }
          const toast = document.createElement("div");
          toast.className = `custom-toast toast-${type}`;
          toast.innerText = message;
          container.appendChild(toast);
          setTimeout(() => {
            toast.remove();
            if (container.childNodes.length === 0) {
              container.remove();
            }
          }, 3000);
        }

        function showConfirm(message) {
          if (document.querySelector(".custom-modal-overlay")) {
            return Promise.resolve(false);
          }
          return new Promise((resolve) => {
            const overlay = document.createElement("div");
            overlay.className = "custom-modal-overlay";

            const cancelText = currentLang === "vi" ? "Hủy" : "Cancel";
            const confirmText = currentLang === "vi" ? "Xóa vĩnh viễn" : "Delete permanently";
            const titleText = currentLang === "vi" ? "Xác nhận xóa" : "Confirm Delete";

            overlay.innerHTML = `
              <div class="custom-modal">
                <div class="custom-modal-title">${titleText}</div>
                <div class="custom-modal-text">${message}</div>
                <div class="custom-modal-buttons">
                  <button class="custom-modal-btn btn-cancel">${cancelText}</button>
                  <button class="custom-modal-btn btn-confirm">${confirmText}</button>
                </div>
              </div>
            `;

            document.body.appendChild(overlay);

            setTimeout(() => overlay.classList.add("active"), 10);

            const cleanup = (result) => {
              overlay.classList.remove("active");
              setTimeout(() => {
                overlay.remove();
                resolve(result);
              }, 300);
            };

            overlay.querySelector(".btn-cancel").addEventListener("click", () => cleanup(false));
            overlay.querySelector(".btn-confirm").addEventListener("click", () => cleanup(true));
          });
        }

        function updateArchiveButtonVisibility() {
          const inputVal = document.getElementById("lyricInput").value.trim();
          const outputArea = document.getElementById("outputArea");
          let hasOutput = false;
          if (outputArea) {
            const emptyPara = document.getElementById("ui-empty-out");
            if (!emptyPara && outputArea.innerText.trim().length > 0) {
              hasOutput = true;
            }
          }
          const hasInput = inputVal.length > 0;
          const btn = document.getElementById("archivePoemBtn");
          if (btn) {
            if (btn.innerText === i18n[currentLang].btnSaved || btn.innerText === "...") {
              return;
            }
            if (hasInput || hasOutput) {
              btn.disabled = false;
              btn.style.opacity = "1";
              btn.style.cursor = "pointer";
              btn.style.pointerEvents = "auto";
              btn.style.borderColor = "var(--text-main)";
              btn.style.color = "var(--text-main)";
            } else {
              btn.disabled = true;
              btn.style.opacity = "0.4";
              btn.style.cursor = "not-allowed";
              btn.style.pointerEvents = "none";
              btn.style.borderColor = "var(--text-muted)";
              btn.style.color = "var(--text-muted)";
              btn.style.background = "transparent";
            }
          }
        }

        async function saveArchive(btn) {
          const token = localStorage.getItem("access_token");
          const t = i18n[currentLang];

          if (!token) {
            showToast(t.errNeedLogin);
            return;
          }

          const content = getCompletePoemContent();
          if (!content) {
            return;
          }

          const originalText = btn.innerText;
          btn.innerText = "...";
          btn.disabled = true;
          btn.style.opacity = "0.6";
          btn.style.cursor = "not-allowed";

          try {
            const res = await fetch(`${API_BASE_URL}/api/poems`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
              },
              body: JSON.stringify({ content: content, is_public: false }),
            });

            if (res.ok) {
              btn.innerText = t.btnSaved;
              btn.style.opacity = "1";
              btn.style.backgroundColor = "var(--text-muted)";
              btn.style.color = "#ffffff";
              btn.style.borderColor = "var(--text-muted)";
              showToast(t.toastSaved);

              setTimeout(() => {
                btn.innerText = t.btnArchive;
                btn.disabled = false;
                btn.style.opacity = "1";
                btn.style.backgroundColor = "transparent";
                btn.style.color = "var(--text-main)";
                btn.style.borderColor = "var(--text-main)";
                btn.style.cursor = "pointer";
                btn.style.pointerEvents = "auto";
                updateArchiveButtonVisibility();
              }, 3000);
            } else {
              const errData = await res.json().catch(() => ({}));
              btn.innerText = originalText;
              btn.disabled = false;
              btn.style.opacity = "1";
              btn.style.cursor = "pointer";
              showToast(t.errSaveFail + (errData.detail || "Lỗi hệ thống"), "error");
            }
          } catch (err) {
            btn.innerText = originalText;
            btn.disabled = false;
            btn.style.opacity = "1";
            btn.style.cursor = "pointer";
            showToast(t.errServerConn, "error");
          }
        }

        function toggleLoading(show) {
          document.getElementById("loadingIndicator").style.display = show
            ? "block"
            : "none";
        }

        function checkAuth() {
          const token = localStorage.getItem("access_token");
          const authStatusArea = document.getElementById("authStatusArea");
          const t = i18n[currentLang];
          const navTabArchive = document.getElementById("navTabArchive");

          if (token) {
            try {
              const payload = JSON.parse(atob(token.split('.')[1]));
              const username = payload.sub || "Thi sĩ";
              authStatusArea.innerHTML = `
              ${t.welcome}, <strong>${username}</strong> | 
              <a href="#" onclick="handleLogout(event)" style="color: var(--text-main); font-weight: 600; text-decoration: none; border-bottom: 1px dashed var(--text-main);">${t.logout}</a>
            `;
              if (navTabArchive) navTabArchive.style.display = "inline-block";
            } catch (e) {
              localStorage.removeItem("access_token");
              showGuestNav(authStatusArea);
            }
          } else {
            showGuestNav(authStatusArea);
          }
        }

        function showGuestNav(element) {
          const t = i18n[currentLang];
          element.innerHTML = `
          <a href="/login" style="color: var(--text-main); font-weight: 600; text-decoration: none;">${t.login}</a> | 
          <a href="/register" style="color: var(--text-main); font-weight: 600; text-decoration: none;">${t.register}</a>
        `;
          const navTabArchive = document.getElementById("navTabArchive");
          if (navTabArchive) navTabArchive.style.display = "none";
        }

        function handleLogout(event) {
          if (event) event.preventDefault();
          localStorage.removeItem("access_token");
          window.location.reload();
        }

        // Initialize language and UI state check on load
        const lyricInput = document.getElementById("lyricInput");
        if (lyricInput) {
          lyricInput.addEventListener("input", updateArchiveButtonVisibility);
          lyricInput.addEventListener("keyup", updateArchiveButtonVisibility);
          lyricInput.addEventListener("paste", updateArchiveButtonVisibility);
        }
        updateUI();
      </script>
</body>

</html>
